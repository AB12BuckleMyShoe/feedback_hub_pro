<!DOCTYPE html>
<html lang="en">
    <head>
        <title>My First Portfolio Project</title>
        <meta charset="UTF-8">
        <link href="style.css" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=home" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    </head>
    <body>
        
        <div class="wrap">
            <div class="navbar-container">
            <nav class="navbar">
                <div class="navbar-brand">
                    <span class="logo-symbol"><i class="fa-solid fa-circle"></i></span>
                    <span class="logo-text">Feedback Pro</span>
                </div>
                <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="feedback.html">Feedback</a></li>
                </ul>
            </nav>
            </div>
            <section class="hero">
            <div class="hero-content">
            <h1 class="welcome fade-up" style="animation-delay: 0.1s"> We value your feedback</h1>
        <h4 class="welcome fade-up" style="animation-delay: 0.3s">Let us know your thoughts to help us improve our services</h4>
        <div class="fade-up" style="animation-delay: 0.5s">
        <button class="welcome-btn" onclick="document.getElementById('feedback-form').scrollIntoView({ behavior: 'smooth' })" >Give Feedback</button>
        </div>
        </div>
        </section>
        <div class="rating-container">
            <h2 class="fade-up" style="animation-delay: 0.7s">Why Choose Us</h2>
            <div class="card-container">
                <div class="fade-up" style="animation-delay: 0.9s">
            <div class="rate-card">
                <i class="fa-regular fa-star"></i>
                <h3>Quality Service</h3>
                </div>
            </div>
            <div class="fade-up" style="animation-delay: 1.1s">
            <div class="rate-card">
                <i class="fa-solid fa-arrow-trend-up"></i>
                <h3>Constant Improvement</h3>
                </div>
            </div>
            <div class="fade-up" style="animation-delay: 1.3s">
            <div class="rate-card">
                <i class="fa-regular fa-face-smile"></i>
                <h3>Customer Satisfaction</h3>
                </div>
            </div>
            </div>
        </div>
        <div class="form-container fade-up" id="feedback-form" style="animation-delay: 0.1s">
            <h2 class="fade-up" style="animation-delay: 0.3s">Submit Your Feedback</h2>
        <form id="feedbackform">
            <input class="fade-up" style="animation-delay: 0.5s" type="text" id="nameInput" placeholder="Enter your name" required>
            <textarea class="fade-up" style="animation-delay: 0.7s" id="feedback" placeholder="Enter your feedback" required></textarea>
            <div class="fade-up" style="animation-delay: 0.9s">
            <button type="submit" id="submitBtn">Submit</button>
            </div>
        </form>
</div>
        <footer class="footer"><p>© 2026 Feedback Pro. All rights reserved.</p></footer>
        </div>
        <script src="script.js"></script>
    </body>
</html>
